<!doctype html>
<meta charset=utf-8>
<meta content="width=device-width, initial-scale=1, shrink-to-fit=no" name="viewport">
<title>Anchor + calc() example</title>

<div class="chart">
	<div class="bar" id="bar-1" style="height:90%"></div>
	<div class="bar" id="bar-2" style="height:25%"></div>
	<div class="bar" id="bar-3" style="height:75%"></div>
	<div class="bg"></div>
</div>
<div class="actions">
	<input data-bar-id="bar-1" type="range" min="0" max="100" value="90" />
	<input data-bar-id="bar-2" type="range" min="0" max="100" value="25" />
	<input data-bar-id="bar-3" type="range" min="0" max="100" value="75" />
</div>
<div class="line max"></div>
<div class="line min"></div>
<div class="tooltip max">👈 Max!</div>
<div class="tooltip min">Min! 👉</div>

<style>
@layer demo {
	.chart {
		anchor-name: --chart;
		#bar-1 { anchor-name: --anchor-1; }
		#bar-2 { anchor-name: --anchor-2; }
		#bar-3 { anchor-name: --anchor-3; }
	}

	.line {
		position: absolute;
		left: anchor(--chart left);
		right: anchor(--chart right);
		border-bottom: 2px dashed gray;
		&.max {
			bottom: max(
				anchor(--anchor-1 top),
				anchor(--anchor-2 top),
				anchor(--anchor-3 top)
			);
			margin-left: 1em;
			anchor-name: --line-max;
		}
		&.min {
			bottom: min(
				anchor(--anchor-1 top),
				anchor(--anchor-2 top),
				anchor(--anchor-3 top)
			);
			margin-right: 1em;
			anchor-name: --line-min;
		}
	}


	.tooltip.max {
		position: absolute;
		position-anchor: --line-max;
		position-area: right;
		padding-right: .5em;
		margin-left: 1em;
		&::after {
			content: "";
			position: absolute;
			left: -1em;
			inset-block: 0;
			border: solid transparent 1em;
			border-right-color: black;
			border-left-width: 0px;
		}
	}
	.tooltip.min {
		position: absolute;
		position-anchor: --line-min;
		position-area: left;
		padding-left: .5em;
		margin-right: 1em;
		&::after {
			content: "";
			position: absolute;
			right: -1em;
			top: 0;
			bottom: 0;
			border: solid transparent 1em;
			border-left-color: black;
			border-right-width: 0px;
		}
	}
}
@layer base {
	:root {
		--anchor-size: 50px;
		--anchored-size: 250px;
	}

	*,
	*:after,
	*:before {
		box-sizing: border-box;
	}

	body {
		display: grid;
		place-items: center;
		align-content: center;
		gap: 1rem;
		min-height: 100vh;
		font-family: "Google Sans", sans-serif, system-ui;
		background: #eee;
		position: relative;
		overflow: hidden;
	}

	.actions {
		width: 80vmin;
		display: grid;
		grid-template-columns: repeat(3, 1fr);
		grid-gap: 1rem;
		padding: 1rem;
	}

	input {
		min-width: 0;
	}

	.chart {
		width: 80vmin;
		aspect-ratio: 4 / 3;
		display: grid;
		grid-template-columns: repeat(3, 1fr);
		gap: 1rem;
		padding: 1rem;
		align-items: end;
		background: white;
		position: relative;
		.bg {
			position: absolute;
			inset: 0;
			grid-row: 1;
			grid-column: 1 / -1;
			z-index: 0;
			background: repeating-linear-gradient(to top, transparent 0 calc(10% - 1px), #eee 0 10%);
		}
		.bar {
			z-index: 1;
		}
	}

	#bar-1 {background-color: #4dabf7;}
	#bar-2 {background-color: #69db7c;}
	#bar-3 {background-color: #ff8787;}

	.tooltip {
		position: absolute;
		height: 2em;
		overflow: visible;
		background: black;
		color: white;
		border: none;
		place-content: center;
	}
	.line {
		z-index: 2;
	}
}
</style>

<script>
// Just a little script to hook up the bar heights to the range inputs.
const update = e => {
	document.getElementById(e.target.getAttribute("data-bar-id") )
		.style.height = `${e.target.value}%`;
};

document.querySelectorAll("input").forEach(input => {
	input.addEventListener("input", update);
});
</script>
